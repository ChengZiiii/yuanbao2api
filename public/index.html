<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元宝2API 管理面板</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>元宝2API 管理面板</h1>
            <div class="subtitle">配置和管理你的元宝 API 服务</div>
        </header>

        <div class="tab-bar">
            <div class="tab active" data-panel="dashboard">📊 仪表盘</div>
            <div class="tab" data-panel="testing">🧪 测试区</div>
            <div class="tab" data-panel="config">⚙️ 配置</div>
            <div class="tab" data-panel="info">ℹ️ API 信息</div>
        </div>

        <div class="panel active" id="panel-dashboard">
            <div class="section" id="statusSection">
                <div class="section-title">服务状态</div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div class="status" id="status">
                        <span class="status-dot"></span>
                        <span>检查中...</span>
                    </div>
                    <button class="btn btn-secondary" onclick="App.checkStatus()">刷新状态</button>
                </div>
            </div>

            <div class="section">
                <div class="section-title">并发仪表盘</div>
                <div class="status-cards">
                    <div class="stat-card">
                        <div class="stat-label">IN-FLIGHT</div>
                        <div class="stat-value-row">
                            <span class="stat-num" id="inflightNum">0</span>
                            <span class="stat-divider">/</span>
                            <span class="stat-max" id="maxConcurrency">1</span>
                        </div>
                        <div class="bar-bg"><div class="bar-fill" id="usageBar"></div></div>
                        <div class="stat-sub" id="usagePct">0%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">WAITING（排队中）</div>
                        <div class="stat-num warn" id="waitingNum">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">COOLDOWN</div>
                        <div class="stat-num muted" id="cooldownNum">0ms</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">请求历史</div>
                <p class="section-subtitle">最近 200 条（内存缓冲，重启即失）</p>
                <table class="log-table">
                    <thead>
                        <tr><th>时间</th><th>方法</th><th>模型</th><th>状态</th><th>耗时</th><th>备注</th></tr>
                    </thead>
                    <tbody id="logBody">
                        <tr><td colspan="6" style="color:#666;text-align:center;">暂无数据</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="panel" id="panel-testing">
            <div class="section"><div class="section-title">API 测试</div><p style="color:#555;font-size:13px;">测试区面板将在后续任务中实现。</p></div>
        </div>
        <div class="panel" id="panel-config">
            <div class="section"><div class="section-title">配置</div><p style="color:#555;font-size:13px;">配置面板将在后续任务中实现。</p></div>
        </div>
        <div class="panel" id="panel-info">
            <div class="section"><div class="section-title">API 信息</div><p style="color:#555;font-size:13px;">API 信息面板将在后续任务中实现。</p></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
