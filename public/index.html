<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元宝2API 管理面板</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>元宝2API 管理面板</h1>
            <div class="subtitle">配置和管理你的元宝 API 服务</div>
        </header>

        <div class="tab-bar">
            <div class="tab active" data-panel="dashboard">📊 仪表盘</div>
            <div class="tab" data-panel="testing">🧪 测试区</div>
            <div class="tab" data-panel="config">⚙️ 配置</div>
            <div class="tab" data-panel="info">ℹ️ API 信息</div>
        </div>

        <div class="panel active" id="panel-dashboard">
            <!-- 服务状态 -->
            <div class="section">
                <div class="section-title">服务状态</div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="status" id="status">
                        <span class="status-dot"></span>
                        <span>检查中...</span>
                    </div>
                    <button class="btn btn-secondary" onclick="App.checkStatus()">刷新状态</button>
                </div>
            </div>

            <!-- 功能配置 -->
            <div class="section">
                <div class="section-title">功能配置</div>
                <div class="toggle-group">
                    <div class="toggle-item">
                        <div class="toggle" id="deepThinkingToggle" onclick="App.toggleFeature('deepThinking')">
                            <span class="toggle-label">深度思考</span>
                            <div class="toggle-switch"></div>
                        </div>
                    </div>
                    <div class="toggle-item">
                        <div class="toggle" id="internetSearchToggle" onclick="App.toggleFeature('internetSearch')">
                            <span class="toggle-label">联网搜索</span>
                            <div class="toggle-switch"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 模型选择 -->
            <div class="section">
                <div class="section-title">模型配置</div>
                <div class="form-group">
                    <label>默认模型</label>
                    <select id="modelSelect">
                        <option value="deep_seek_v3">DeepSeek - 深度思考</option>
                        <option value="hunyuan">Hunyuan - 全能处理</option>
                    </select>
                </div>
            </div>

            <!-- API 测试 -->
            <div class="section">
                <div class="section-title">API 测试</div>
                <div class="form-group">
                    <label>测试消息</label>
                    <input type="text" id="testMessage" placeholder="输入测试消息..." value="你好">
                </div>
                <div style="margin-bottom: 16px;">
                    <button class="btn" onclick="App.testAPI()">发送测试</button>
                </div>
                <div class="test-section">
                    <div>
                        <label>请求</label>
                        <div class="test-result" id="requestResult">等待测试...</div>
                    </div>
                    <div>
                        <label>响应</label>
                        <div class="test-result" id="responseResult">等待测试...</div>
                    </div>
                </div>
            </div>

            <!-- API 信息 -->
            <div class="section">
                <div class="section-title">API 信息</div>
                <div class="form-group">
                    <label>API 端点</label>
                    <input type="text" readonly value="http://localhost:3000/v1/chat/completions">
                </div>
                <div class="form-group">
                    <label>模型列表端点</label>
                    <input type="text" readonly value="http://localhost:3000/v1/models">
                </div>
            </div>
        </div>

        <div class="panel" id="panel-testing">
            <div class="section"><div class="section-title">API 测试</div><p style="color:#555;font-size:13px;">测试区面板将在后续任务中实现。</p></div>
        </div>
        <div class="panel" id="panel-config">
            <div class="section"><div class="section-title">配置</div><p style="color:#555;font-size:13px;">配置面板将在后续任务中实现。</p></div>
        </div>
        <div class="panel" id="panel-info">
            <div class="section"><div class="section-title">API 信息</div><p style="color:#555;font-size:13px;">API 信息面板将在后续任务中实现。</p></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
